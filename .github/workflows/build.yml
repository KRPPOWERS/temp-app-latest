name: Build Temple App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        run: git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git repo

      - name: Install Java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openjdk-17-jdk wget unzip
          java -version

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/
          sudo ln -sf /opt/gradle-8.4/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Install Android SDK
        run: |
          sudo mkdir -p /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          sudo unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk/cmdline-tools
          sudo mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest
          sudo chmod -R 777 /opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Write all project files
        run: |
          echo "b3JnLmdyYWRsZS5qdm1hcmdzPS1YbXgyMDQ4bSAtRGZpbGUuZW5jb2Rpbmc9VVRGLTgKYW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9dHJ1ZQo=" | base64 -d > repo/gradle.properties
          echo "" | base64 -d > repo/app/build.gradle
          echo "" | base64 -d > repo/app/src/main/AndroidManifest.xml
          echo "" | base64 -d > repo/app/src/main/java/com/kallichi/temple/MainActivity.java
          rm -rf repo/app/src/main/res/mipmap-hdpi repo/app/src/main/res/mipmap-mdpi
          rm -rf repo/app/src/main/res/mipmap-xhdpi repo/app/src/main/res/mipmap-xxhdpi
          rm -rf repo/app/src/main/res/mipmap-xxxhdpi
          mkdir -p repo/app/src/main/res/mipmap-anydpi-v26
          mkdir -p repo/app/src/main/res/drawable
          mkdir -p repo/app/src/main/res/values
          echo "" | base64 -d > repo/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp repo/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml repo/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          echo "" | base64 -d > repo/app/src/main/res/drawable/ic_launcher_foreground.xml
          echo "" | base64 -d > repo/app/src/main/res/values/colors.xml
          echo "PHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPkthbGxpY2hpIEFtbWFuIFRlbXBsZTwvc3RyaW5nPgo8L3Jlc291cmNlcz4K" | base64 -d > repo/app/src/main/res/values/strings.xml
          echo "" | base64 -d > repo/app/src/main/res/values/themes.xml
          echo "All files written OK"

      - name: Generate Gradle wrapper
        run: |
          cd repo
          export ANDROID_HOME=/opt/android-sdk
          gradle wrapper --gradle-version 8.4
          ls -lh gradle/wrapper/

      - name: Build APK
        run: |
          cd repo
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools
          chmod +x gradlew
          gradle assembleDebug --stacktrace

      - name: Find and stage APK
        run: |
          find repo -name "*.apk"
          mkdir -p /tmp/apk-output
          APK=$(find repo -name "*.apk" | head -1)
          if [ -z "$APK" ]; then echo "No APK!"; exit 1; fi
          cp "$APK" /tmp/apk-output/KallichiAmmanTemple.apk
          echo "APK: $(du -sh /tmp/apk-output/KallichiAmmanTemple.apk)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: KallichiAmmanTemple-APK
          path: /tmp/apk-output/KallichiAmmanTemple.apk
          retention-days: 30
