name: Build Temple App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk

    steps:
      - name: Checkout code
        run: |
          git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git repo
          echo "✅ Checkout done"
          ls repo/

      - name: Fix project files
        run: |
          # Create gradle.properties with AndroidX enabled
          cat > repo/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          echo "✅ gradle.properties created"
          cat repo/gradle.properties

          # Fix app/build.gradle - simplify dependencies to avoid conflicts
          cat > repo/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.kallichi.temple'
              compileSdk 34
              defaultConfig {
                  applicationId "com.kallichi.temple"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  debug {
                      debuggable true
                  }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              buildFeatures {
                  buildConfig true
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
          }
          EOF
          echo "✅ app/build.gradle simplified"
          cat repo/app/build.gradle

      - name: Install Java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openjdk-17-jdk wget unzip
          java -version

      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p repo/gradle/wrapper
          wget -q \
            "https://services.gradle.org/distributions/gradle-8.4-bin.zip" \
            -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          find /tmp/gradle-dist -name "gradle-wrapper.jar" | head -1 | xargs -I{} cp {} repo/gradle/wrapper/gradle-wrapper.jar
          ls -lh repo/gradle/wrapper/

      - name: Install Gradle system-wide
        run: |
          sudo ln -sf /tmp/gradle-dist/gradle-8.4/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Install Android SDK
        run: |
          sudo mkdir -p /opt/android-sdk/cmdline-tools
          wget -q \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -O /tmp/cmdline-tools.zip
          sudo unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk/cmdline-tools
          sudo mv /opt/android-sdk/cmdline-tools/cmdline-tools \
                  /opt/android-sdk/cmdline-tools/latest
          sudo chmod -R 777 /opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "✅ Android SDK ready"

      - name: Build APK
        run: |
          cd repo
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace || gradle assembleDebug --stacktrace

      - name: Find and copy APK
        run: |
          echo "Searching for APK..."
          find repo -name "*.apk" 2>/dev/null
          mkdir -p /tmp/apk-output
          APK=$(find repo -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          cp "$APK" /tmp/apk-output/KallichiAmmanTemple.apk
          echo "✅ APK ready: $(du -sh /tmp/apk-output/KallichiAmmanTemple.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: KallichiAmmanTemple-APK
          path: /tmp/apk-output/KallichiAmmanTemple.apk
          retention-days: 30
