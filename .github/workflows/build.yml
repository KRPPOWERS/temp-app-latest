name: Build Temple App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk

    steps:
      - name: Checkout code
        run: |
          git config --global credential.helper store
          git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git repo
          cd repo && git checkout ${{ github.sha }}

      - name: Install Java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openjdk-17-jdk
          java -version

      - name: Install Android SDK
        run: |
          sudo mkdir -p /opt/android-sdk/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          sudo unzip -q commandlinetools-linux-11076708_latest.zip -d /opt/android-sdk/cmdline-tools
          sudo mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest
          sudo chmod -R 777 /opt/android-sdk
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        run: |
          cd repo
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        run: |
          APK_PATH="repo/app/build/outputs/apk/debug/app-debug.apk"
          echo "APK size: $(du -sh $APK_PATH)"
          mkdir -p /tmp/apk-output
          cp $APK_PATH /tmp/apk-output/KallichiAmmanTemple.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: KallichiAmmanTemple-APK
          path: /tmp/apk-output/KallichiAmmanTemple.apk
          retention-days: 30
